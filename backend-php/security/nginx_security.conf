# ============================================================
# MediConnect – Nginx Security Configuration
# File: backend/security/nginx_security.conf
# ============================================================
# Include this file in your nginx server block:
#   include /path/to/backend/security/nginx_security.conf;
# ============================================================

# ─── Security Headers ───
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# HSTS (uncomment in production with HTTPS)
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Hide server info
server_tokens off;
more_clear_headers "X-Powered-By";

# ─── Deny access to sensitive files ───
location ~ /\.(env|git|htaccess) {
    deny all;
    return 404;
}

location ~ \.(sql|log|bak|old|orig|swp)$ {
    deny all;
    return 404;
}

# ─── Deny direct access to security module PHP files ───
location ~ ^/backend/security/.*\.php$ {
    deny all;
    return 404;
}

# ─── Deny access to config directory ───
location ~ ^/backend/config/ {
    deny all;
    return 404;
}

# ─── Pass Authorization header to PHP-FPM ───
# Required for JWT Bearer token extraction
fastcgi_param HTTP_AUTHORIZATION $http_authorization;

# ─── Rate Limiting at Nginx level (optional, additional layer) ───
# Define these in the http {} block:
#   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
#   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
#
# Then apply in location blocks:
#   location ~ ^/backend/api/auth/ {
#       limit_req zone=login burst=3 nodelay;
#       # ... fastcgi config ...
#   }
#   location ~ ^/backend/api/ {
#       limit_req zone=api burst=20 nodelay;
#       # ... fastcgi config ...
#   }

# ─── Request body size limit ───
client_max_body_size 10m;

# ─── Timeouts ───
proxy_read_timeout 30s;
proxy_connect_timeout 10s;
